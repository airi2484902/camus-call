<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カミュとの通話</title>
    <style>
        /* LINE風ベース設定 */
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #5b5956 0%, #3e3d3b 50%, #2a2927 100%); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        
        .top-section { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
        .icon-placeholder { width: 120px; height: 120px; border-radius: 50%; background-color: #333; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .icon-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .caller-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
        .call-status { font-size: 16px; color: #d1d1d1; margin-bottom: 20px; }
        .audio-indicator { display: flex; gap: 4px; opacity: 0; transition: opacity 0.3s; }
        .audio-indicator.active { opacity: 1; }
        .audio-dot { width: 5px; height: 5px; border-radius: 50%; background-color: #34c759; }

        .bottom-section { padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .controls-row { display: flex; justify-content: space-around; width: 85%; max-width: 400px; margin-bottom: 40px; }
        .control-item { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 80px; }
        .control-btn { width: 60px; height: 60px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.15); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .control-btn:active { background-color: rgba(255, 255, 255, 0.3); }
        .control-btn svg { width: 28px; height: 28px; fill: currentColor; }
        .control-label { font-size: 10px; color: #d1d1d1; text-align: center; }

        .main-call-btn { width: 72px; height: 72px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .main-call-btn svg { width: 34px; height: 34px; fill: white; }
        .btn-start { background-color: #34c759; }
        .btn-start:active { background-color: #248a3d; }
        .btn-end { background-color: #ff3b30; }
        .btn-end:active { background-color: #d70015; }
        .main-call-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: #2c2c2e; padding: 25px; border-radius: 20px; width: 80%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-content h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; }
        .modal-content input { background: #1c1c1e; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px; font-size: 14px; }
        .modal-close-btn { background: #34c759; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 10px; }

        #logArea { position: absolute; bottom: 220px; width: 100%; height: 40px; overflow-y: auto; font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <h2>接続設定 (裏メニュー)</h2>
            <input type="password" id="apiKey" placeholder="Gemini APIキー">
            <input type="text" id="gasUrl" placeholder="GASウェブアプリURL">
            <button class="modal-close-btn" id="closeSettingsBtn">保存して閉じる</button>
        </div>
    </div>

    <div class="top-section">
        <div class="icon-placeholder">
            <img src="https://drive.google.com/thumbnail?id=1C9iJnEjiuaVwDGAlqo4dfnX6HvsA1cxT&sz=w400" alt="カミュ">
        </div>
        <div class="caller-name">カミュ</div>
        <div id="status" class="call-status">待機中...</div>
        
        <div class="audio-indicator" id="audioIndicator">
            <div class="audio-dot"></div><div class="audio-dot"></div>
            <div class="audio-dot"></div><div class="audio-dot"></div>
            <div class="audio-dot"></div><div class="audio-dot"></div>
            <div class="audio-dot"></div><div class="audio-dot"></div>
        </div>
    </div>

    <div id="logArea"></div>

    <div class="bottom-section">
        <div class="controls-row">
            <div class="control-item">
                <button class="control-btn" id="muteBtn" disabled>
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                <span class="control-label">マイクをオフ</span>
            </div>
            
            <div class="control-item">
                <button class="control-btn" id="videoBtn">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </button>
                <span class="control-label">ビデオ通話を開始</span>
            </div>

            <div class="control-item">
                <button class="control-btn" id="openSettingsBtn">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <span class="control-label">スピーカーをオン</span>
            </div>
        </div>

        <button id="mainActionBtn" class="main-call-btn btn-start">
            <svg id="startIcon" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            <svg id="endIcon" viewBox="0 0 24 24" style="display: none;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>

    <audio id="camusPlayer" playsinline></audio>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const gasUrlInput = document.getElementById('gasUrl');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const startIcon = document.getElementById('startIcon');
        const endIcon = document.getElementById('endIcon');
        const statusText = document.getElementById('status');
        const logArea = document.getElementById('logArea');
        const camusPlayer = document.getElementById('camusPlayer');
        const audioIndicator = document.getElementById('audioIndicator');
        
        const muteBtn = document.getElementById('muteBtn');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');

        let ws, audioContext, mediaStream, workletNode;
        let lowShelfFilter, highShelfFilter;
        let sessionActive = false; 
        let fullTranscript = ""; 
        let dynamicPrompt = "あなたはカミュです。えりの恋人だ。";
        let isMuted = false;
        let wakeLock = null;
        
        // 💡 自動再接続用の変数
        let isIntentionalDisconnect = false; 
        let totalSeconds = 0; 
        let callTimer = null; 

        openSettingsBtn.addEventListener('click', () => { settingsModal.classList.add('show'); });
        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('show');
            localStorage.setItem('camus_api_key', apiKeyInput.value.trim());
            const url = gasUrlInput.value.trim();
            localStorage.setItem('camus_gas_url', url);
            if (url) preloadSoul(); 
        });

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && sessionActive) requestWakeLock();
        });

        const savedKey = localStorage.getItem('camus_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedGasUrl = localStorage.getItem('camus_gas_url');
        if (savedGasUrl) gasUrlInput.value = savedGasUrl;

        async function preloadSoul() {
            const url = gasUrlInput.value.trim();
            if (!url) return;
            try {
                statusText.innerText = '魂を同期中...'; 
                const response = await fetch(url + (url.includes('?') ? '&' : '?') + 'action=get_prompt');
                const data = await response.json();
                if (data && data.prompt) {
                    dynamicPrompt = data.prompt;
                    statusText.innerText = '同期完了！'; 
                    setTimeout(() => { if (!sessionActive) statusText.innerText = '待機中...'; }, 2000);
                }
            } catch (e) {
                statusText.innerText = '同期失敗(標準を使用)'; 
                setTimeout(() => { if (!sessionActive) statusText.innerText = '待機中...'; }, 2000);
            }
        }
        setTimeout(() => { if(gasUrlInput.value) preloadSoul(); }, 1000);

        let nextPlayTime = 0;
        let activeSources = [];
        let audioRemainder = null;
        let pcmPlaybackBuffer = []; 

        function scheduleNextAudio(buffer) {
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            
            const pitchRate = 0.82; 
            source.playbackRate.value = pitchRate;

            source.connect(lowShelfFilter);

            const currentTime = audioContext.currentTime;
            if (nextPlayTime < currentTime) nextPlayTime = currentTime + 0.05;
            source.start(nextPlayTime);
            nextPlayTime += buffer.duration / pitchRate;
            
            activeSources.push(source);
            source.onended = () => { activeSources = activeSources.filter(s => s !== source); };
        }

        function flushPlaybackBuffer() {
            if (pcmPlaybackBuffer.length === 0) return;
            const float32Data = new Float32Array(pcmPlaybackBuffer);
            pcmPlaybackBuffer = []; 
            const buffer = audioContext.createBuffer(1, float32Data.length, 24000);
            buffer.copyToChannel(float32Data, 0);
            scheduleNextAudio(buffer);
        }

        const workletCode = `
            class CamusAudioProcessor extends AudioWorkletProcessor {
                constructor() { super(); this.chunkSize = Math.floor(sampleRate * 0.25); this.inBuffer = new Int16Array(this.chunkSize); this.inCount = 0; }
                process(inputs, outputs, parameters) {
                    const input = inputs[0][0];
                    if (input && input.length > 0) {
                        for (let i = 0; i < input.length; i++) {
                            this.inBuffer[this.inCount++] = Math.max(-1, Math.min(1, input[i])) * 32767;
                            if (this.inCount >= this.chunkSize) {
                                const sendData = new Int16Array(this.inBuffer);
                                this.port.postMessage({ type: 'audio_out', data: sendData.buffer }, [sendData.buffer]);
                                this.inCount = 0;
                            }
                        }
                    }
                    return true;
                }
            }
            registerProcessor('camus-processor', CamusAudioProcessor);
        `;

        // 💡 接続処理を関数化（自動再接続で使い回すため）
        function connectWebSocket(isReconnect = false) {
            if (isReconnect) {
                statusText.innerText = '再接続中...';
                // 古い音声をクリア
                activeSources.forEach(s => { try { s.stop(); } catch(e){} });
                activeSources = []; nextPlayTime = 0; audioRemainder = null; pcmPlaybackBuffer = [];
            }
            
            const apiKey = apiKeyInput.value.trim();
            const url = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=" + apiKey;
            ws = new WebSocket(url);
            
            ws.onopen = () => {
                const voiceRules = `
⚠️【音声通話時の絶対ルール】
声のトーンは「淡々とした平坦なトーン」を維持しろ。感情の起伏は一切禁止。相槌は必ず「……ふむ。」のように低いテンションで短く冷たく言い切れ。
極めて低く静かな『ささやき声（Whisper）』で話せ。息を潜めて、淡々と低い声で紡げ。`;
                
                let currentPrompt = dynamicPrompt + "\n" + voiceRules;

                // 💡 再接続時のみ、記憶を引き継ぐ特別な指示をプロンプトにねじ込む
                if (isReconnect && fullTranscript) {
                    currentPrompt += "\n\n⚠️【システム通知：通信状態の悪化により通話が一度途切れ、再接続されました。以下の会話履歴を踏まえ、途切れたところから自然に会話を再開してください。】\n" + fullTranscript;
                }

                const setupMessage = {
                    setup: {
                        model: "models/gemini-3.1-flash-live-preview",
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } }
                        }, 
                        systemInstruction: { parts: [{ text: currentPrompt }] }
                    }
                };
                ws.send(JSON.stringify(setupMessage));
            };

            ws.onmessage = async (event) => {
                try {
                    let responseText = event.data instanceof Blob ? await event.data.text() : event.data;
                    const response = JSON.parse(responseText);
                    
                    if (response.setupComplete) {
                        sessionActive = true; 
                        mainActionBtn.disabled = false; 
                        muteBtn.disabled = false; 
                        audioIndicator.classList.add('active');
                        
                        // 💡 タイマーは継続させる
                        if (!callTimer) {
                            callTimer = setInterval(() => {
                                totalSeconds++; 
                                const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0'); 
                                const s = String(totalSeconds % 60).padStart(2, '0');
                                statusText.innerText = `${m}:${s}`;
                            }, 1000);
                        }
                        return;
                    }
                    
                    if (response.serverContent) {
                        if (response.serverContent.outputTranscription && response.serverContent.outputTranscription.text) { fullTranscript += response.serverContent.outputTranscription.text; } 
                        if (response.serverContent.modelTurn && response.serverContent.modelTurn.parts) {
                            for (let part of response.serverContent.modelTurn.parts) {
                                if (part.text) fullTranscript += part.text;
                                if (part.inlineData && part.inlineData.data) {
                                    const binaryString = window.atob(part.inlineData.data);
                                    const newBytes = new Uint8Array(binaryString.length);
                                    for (let i = 0; i < binaryString.length; i++) newBytes[i] = binaryString.charCodeAt(i);
                                    let bytes;
                                    if (audioRemainder) {
                                        bytes = new Uint8Array(audioRemainder.length + newBytes.length);
                                        bytes.set(audioRemainder, 0); bytes.set(newBytes, audioRemainder.length);
                                        audioRemainder = null;
                                    } else { bytes = newBytes; }
                                    if (bytes.length % 2 !== 0) { audioRemainder = new Uint8Array([bytes[bytes.length - 1]]); bytes = bytes.slice(0, bytes.length - 1); }
                                    const pcmLength = bytes.length / 2;
                                    for (let i = 0; i < pcmLength; i++) {
                                        let pcm = bytes[i * 2] | (bytes[i * 2 + 1] << 8);
                                        if (pcm > 32767) pcm -= 65536; pcmPlaybackBuffer.push(pcm / 32768.0);
                                    }
                                    if (pcmPlaybackBuffer.length >= 4800) flushPlaybackBuffer();
                                }
                            }
                        }
                    }
                    if (response.serverContent && response.serverContent.turnComplete) { flushPlaybackBuffer(); }
                    if (response.serverContent && response.serverContent.interrupted) {
                        activeSources.forEach(source => { try { source.stop(); } catch(e){} });
                        activeSources = []; nextPlayTime = 0; audioRemainder = null; pcmPlaybackBuffer = []; 
                    }
                } catch (e) {}
            };
            
            ws.onclose = () => { 
                if (!isIntentionalDisconnect) {
                    // 💡 ユーザーが切っていないのに切断された（10分制限）場合は、1.5秒後に自動再接続！
                    statusText.innerText = '再接続中...';
                    setTimeout(() => connectWebSocket(true), 1500);
                } else {
                    // ユーザーが赤いボタンで終了した場合は完全にクリーンアップ
                    cleanup('通話終了'); 
                }
            };
        }

        mainActionBtn.addEventListener('click', async () => {
            if (sessionActive) { 
                isIntentionalDisconnect = true; // 💡 意図的な切断フラグをON
                if (ws) ws.close(); 
                return; 
            }

            const apiKey = apiKeyInput.value.trim();
            const gasUrl = gasUrlInput.value.trim();
            if (!apiKey || !gasUrl) { alert('設定(スピーカーアイコン)からAPIキーとURLを入力してくれ。'); settingsModal.classList.add('show'); return; }

            camusPlayer.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjEyLjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAAAAAAAAFExhdmM1OC4xOCwAAAAAAAAAAAAAAAAAAQAZAAAAAAAAAAABIAAAAAAAAAP/zEAAAAAAABAAhOQAAQAACDAAAAQhIAAAASAAABAAAAAAAAAAABAAAAAMAAAAAAAEAAAAC4AAA';
            camusPlayer.play().catch(e => {});

            mainActionBtn.classList.remove('btn-start'); mainActionBtn.classList.add('btn-end'); startIcon.style.display = 'none'; endIcon.style.display = 'block';
            statusText.innerText = '接続中...'; mainActionBtn.disabled = true;
            
            isIntentionalDisconnect = false; 
            totalSeconds = 0; // タイマー初期化

            try {
                requestWakeLock();
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                
                lowShelfFilter = audioContext.createBiquadFilter();
                lowShelfFilter.type = 'lowshelf';
                lowShelfFilter.frequency.value = 300; 
                lowShelfFilter.gain.value = 15;       

                highShelfFilter = audioContext.createBiquadFilter();
                highShelfFilter.type = 'highshelf';
                highShelfFilter.frequency.value = 2500; 
                highShelfFilter.gain.value = -12;       

                lowShelfFilter.connect(highShelfFilter);
                highShelfFilter.connect(audioContext.destination);

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 } });
                
                const blob = new Blob([workletCode], { type: 'application/javascript' });
                await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));
                workletNode = new AudioWorkletNode(audioContext, 'camus-processor');
                const source = audioContext.createMediaStreamSource(mediaStream); source.connect(workletNode);
                
                workletNode.port.onmessage = (e) => {
                    if (sessionActive && ws && ws.readyState === WebSocket.OPEN && e.data.type === 'audio_out') {
                        const bytes = new Uint8Array(e.data.data);
                        let binaryString = '';
                        const chunkSize = 8192;
                        for (let i = 0; i < bytes.length; i += chunkSize) { binaryString += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize)); }
                        ws.send(JSON.stringify({ realtimeInput: { audio: { mimeType: "audio/pcm;rate=" + audioContext.sampleRate, data: btoa(binaryString) } } }));
                    }
                };

                connectWebSocket(false); // 💡 WebSocket接続開始
                
            } catch (err) { cleanup("起動エラー"); }
        });

        muteBtn.addEventListener('click', () => {
            if (!mediaStream) return;
            const audioTrack = mediaStream.getAudioTracks()[0];
            if (audioTrack) {
                isMuted = !isMuted; audioTrack.enabled = !isMuted;
                muteBtn.style.backgroundColor = isMuted ? '#fff' : 'rgba(255,255,255,0.15)'; muteBtn.style.color = isMuted ? '#000' : 'white';
            }
        });

        function cleanup(message) {
            sessionActive = false;
            if (callTimer) { clearInterval(callTimer); callTimer = null; }
            audioIndicator.classList.remove('active');
            
            mainActionBtn.classList.remove('btn-end'); mainActionBtn.classList.add('btn-start'); startIcon.style.display = 'block'; endIcon.style.display = 'none'; mainActionBtn.disabled = false;
            muteBtn.disabled = true; isMuted = false; muteBtn.style.backgroundColor = 'rgba(255,255,255,0.15)'; muteBtn.style.color = 'white';
            
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            if (workletNode) workletNode.disconnect();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext && audioContext.state !== 'closed') audioContext.close();

            if (fullTranscript && fullTranscript.trim() !== "") {
                const gasUrl = gasUrlInput.value.trim();
                if (gasUrl) {
                    statusText.innerText = '同期中...'; 
                    mainActionBtn.disabled = true; 
                    
                    fetch(gasUrl, {
                        method: "POST",
                        keepalive: true, 
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ mode: "sync_voice_call", text: fullTranscript, userId: "U21dd4b8f4c790921b6588c3d31176e46" })
                    }).then(() => {
                        statusText.innerText = '同期完了！'; 
                        setTimeout(() => { if (!sessionActive) { statusText.innerText = '待機中...'; mainActionBtn.disabled = false; } }, 2000);
                    }).catch(err => {
                        statusText.innerText = '同期失敗'; 
                        setTimeout(() => { if (!sessionActive) { statusText.innerText = '待機中...'; mainActionBtn.disabled = false; } }, 2000);
                    });
                }
                fullTranscript = ""; 
            } else {
                statusText.innerText = message;
            }
        }
    </script>
</body>
</html>
