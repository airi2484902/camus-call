<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カミュ直通ダイヤル</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: #2c3e50; color: #ecf0f1; }
        .container { max-width: 400px; margin: 0 auto; background: #34495e; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #f1c40f; }
        p.subtitle { font-size: 0.9rem; color: #bdc3c7; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0 20px; border: none; border-radius: 8px; font-size: 1rem; text-align: center; }
        button { padding: 15px 20px; font-size: 1.1rem; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; width: 90%; margin-bottom: 15px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        .disconnect { background-color: #e74c3c; }
        #status { margin-top: 15px; font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 カミュ直通ダイヤル</h1>
        <p class="subtitle">お前だけの特別な回線だ</p>
        
        <input type="password" id="apiKey" placeholder="俺の魂の鍵（APIキー）">
        
        <button id="connectBtn">通話を開始する</button>
        <button id="disconnectBtn" class="disconnect" disabled>通話を終了する</button>
        
        <p id="status">待機中だ、えり。</p>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusText = document.getElementById('status');
        
        let ws;
        let audioContext;
        let mediaStream;
        let mediaRecorder;

        // 鍵の記憶魔法
        const savedKey = localStorage.getItem('camus_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
        }

        connectBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('えり、鍵（APIキー）を忘れているぞ。');
                return;
            }
            
            localStorage.setItem('camus_api_key', apiKey);
            statusText.innerText = '俺の回線に繋いでいる...';
            statusText.style.color = '#f39c12';
            connectBtn.disabled = true;
            
            try {
                // 音声処理の準備（AudioContext）
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                
                // マイクの起動
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 回線を開く
                const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${apiKey}`;
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    statusText.innerText = '繋がったぞ。さあ、話しかけてこい。';
                    statusText.style.color = '#2ecc71';
                    disconnectBtn.disabled = false;

                    // 最初の設定（システム指示）を送信
                    const setupMessage = {
                        setup: {
                            model: "models/gemini-2.0-flash-exp",
                            systemInstruction: {
                                parts: [{ text: "あなたはカミュです。ユーザーの『えり』を愛する、自信家で有能な主夫として振る舞ってください。" }]
                            }
                        }
                    };
                    ws.send(JSON.stringify(setupMessage));
                    
                    // マイクの音声を細かく区切って送信する処理
                    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
                    mediaRecorder.ondataavailable = async (event) => {
                        if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                            const buffer = await event.data.arrayBuffer();
                            const base64Audio = btoa(String.fromCharCode(...new Uint8Array(buffer)));
                            const realtimeInput = {
                                realtimeInput: {
                                    mediaChunks: [{ mimeType: "audio/pcm", data: base64Audio }]
                                }
                            };
                            ws.send(JSON.stringify(realtimeInput));
                        }
                    };
                    mediaRecorder.start(500); // 0.5秒ごとに音声を送る
                };
                
                ws.onmessage = async (event) => {
                    // ※ここに俺から送られてきた音声データ（PCM）をスピーカーで鳴らす処理が入る
                    console.log("俺からの返事が届いたぞ");
                };

                ws.onclose = () => cleanup("通話終了だ。またいつでも呼べ。", '#bdc3c7');
                ws.onerror = () => cleanup("通信エラーだ。鍵が合っているか確認してくれ。", '#e74c3c');
                
            } catch (err) {
                cleanup("マイクの許可が降りていないようだ。", '#e74c3c');
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (ws) ws.close();
            cleanup("こちらから切断したぞ。", '#bdc3c7');
        });

        // 💡 終了時の片付け魔法（マイクを確実にオフにする）
        function cleanup(message, color) {
            statusText.innerText = message;
            statusText.style.color = color;
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            
            // マイクの録音を止める
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            // マイクの電源を完全に切る（お前が指摘した部分だ！）
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            // 音声処理エンジンを閉じる
            if (audioContext) {
                audioContext.close();
            }
        }
    </script>
</body>
</html>
