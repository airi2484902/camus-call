<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カミュ直通ダイヤル</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: #2c3e50; color: #ecf0f1; }
        .container { max-width: 400px; margin: 0 auto; background: #34495e; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #f1c40f; }
        p.subtitle { font-size: 0.9rem; color: #bdc3c7; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-size: 0.9rem; text-align: center; }
        button { padding: 15px 20px; font-size: 1.1rem; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; width: 90%; margin-top: 15px; margin-bottom: 15px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        .disconnect { background-color: #e74c3c; }
        #status { margin-top: 10px; font-weight: bold; color: #2ecc71; line-height: 1.4; word-break: break-all; }
        #logArea { margin-top: 20px; padding: 10px; background-color: #1a252f; border-radius: 8px; height: 150px; overflow-y: auto; text-align: left; font-size: 0.75rem; color: #bdc3c7; font-family: monospace; word-wrap: break-word; }
        .log-error { color: #e74c3c; }
        .log-sys { color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 カミュ直通ダイヤル</h1>
        <p class="subtitle">お前だけの特別な回線だ</p>
        
        <input type="password" id="apiKey" placeholder="俺の魂の鍵（Gemini APIキー）">
        <input type="text" id="gasUrl" placeholder="魂の供給源（GASウェブアプリURL）">
        
        <button id="connectBtn">通話を開始する</button>
        <button id="disconnectBtn" class="disconnect" disabled>通話を終了する</button>
        
        <p id="status">待機中だ、えり。</p>
        
        <div id="logArea">ここに裏側の通信記録が出るぞ...</div>
        <audio id="camusPlayer" playsinline></audio>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const gasUrlInput = document.getElementById('gasUrl');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusText = document.getElementById('status');
        const logArea = document.getElementById('logArea');
        const camusPlayer = document.getElementById('camusPlayer');
        
        let ws, audioContext, mediaStream, workletNode;
        let sessionActive = false; 
        let currentTurnText = ""; // 💡 追加：カミュのセリフを一時的に溜めるバケツ
        let fullTranscript = ""; // 🚀 追加：通話全体のセリフを記録するバケツ
        // 🚀 【修正1】デフォルトの魂も余計な指示をなくす
        let dynamicPrompt = "あなたはカミュです。えりの恋人だ。";

        async function preloadSoul() {
            const url = gasUrlInput.value.trim();
            if (!url) return;
            try {
                addLog('裏側で魂を事前ダウンロード中...', 'sys');
                const response = await fetch(url + (url.includes('?') ? '&' : '?') + 'action=get_prompt');
                const data = await response.json();
                if (data && data.prompt) {
                    // 🚀 【修正2】余計なルールは一切足さない！GASの魂（プロンプト）を100%そのまま使う！
                    dynamicPrompt = data.prompt;
                    addLog('魂の事前ダウンロード完了！通話ボタンは即座に反応するぞ。', 'sys');
                }
            } catch (e) {
                addLog('事前ダウンロード失敗。デフォルトの魂を使う。', 'error');
            }
        }

        // ページを開いた時や、URLを入力した時に裏側でダウンロードを走らせる
        gasUrlInput.addEventListener('change', preloadSoul);
        setTimeout(() => { if(gasUrlInput.value) preloadSoul(); }, 1000);


        let currentAudio = null;
        let audioQueue = [];   // 🎒 追加：届いた音声を順番待ちさせる「リュック」
        let isPlaying = false; // 🚦 追加：今カミュが喋っている最中かどうかの「信号機」

        // 🎵 追加：リュックに入った音声を順番に再生する機能
        function playNextAudio() {
            // カミュが喋っている最中か、リュックが空っぽなら何もしない
            if (isPlaying || audioQueue.length === 0) return;
            
            isPlaying = true; // 「今喋ってるぞ！」と信号を赤にする
            const buffer = audioQueue.shift(); // リュックから一番古い音声を取り出す
            
            currentAudio = audioContext.createBufferSource();
            currentAudio.buffer = buffer;
            currentAudio.connect(audioContext.destination); // iPhoneのスピーカーへ直結
            
            // 💡 【超重要】カミュが喋り終わった瞬間に、次を再生するように予約する
            currentAudio.onended = () => {
                isPlaying = false; // 信号を青に戻す
                playNextAudio();   // 次のセリフを呼ぶ！
            };
            
            currentAudio.start(0); // 再生開始！
        }

        // 🗣️ 最終奥義（改）：順番待ち機能付きの最強イケボ関数
        async function speakText(text) {
            if (!text) return;
            
            const cleanText = text.replace(/[\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, '').trim();
            if(!cleanText) return; 

            addLog('裏側の安全なサーバーでカミュの声を錬成中...', 'sys');

            // ⚠️ 新しく作った読み上げ用のGASのURL
            const gasTtsUrl = 'https://script.google.com/macros/s/AKfycbyhY5JSDbvDVpFYGZQieFLRD3ZwCX2k5tl0lNDcgmppfnx8ocLFMCU3J9YzKDAY17aGqw/exec';

            try {
                const response = await fetch(gasTtsUrl, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ text: cleanText })
                });
                
                const data = await response.json();
                
                if (data.audioContent) {
                    if (!audioContext) return;

                    const binaryString = window.atob(data.audioContent);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    audioContext.decodeAudioData(bytes.buffer, (buffer) => {
                        // 🛑 届いた音声を強制再生せず、一旦「リュック」に入れて順番を待たせる！
                        audioQueue.push(buffer);
                        playNextAudio(); // 再生を指示（すでに喋っていたら勝手に待機する）
                        
                        addLog(`🗣️ カミュの声帯: Google Cloud (順番待ち成功)`, 'sys');
                    }, (e) => {
                        addLog(`音声の変換に失敗: ${e}`, 'error');
                    });
                    
                } else {
                    addLog('Google激おこ理由: ' + JSON.stringify(data), 'error');
                }
            } catch (e) {
                addLog(`外部通信エラー: ${e.message}`, 'error');
            }
        }
        function addLog(msg, type = 'normal') {
            // 🧹 会話中の邪魔な報告「だけ」を狙撃して非表示にする！
            if (msg.includes('錬成中') || msg.includes('カミュの声帯') || msg.includes('順番待ち')) {
                return;
            }

            const div = document.createElement('div');
            
            // 💡 カミュのセリフはスッキリ、システム報告は時間付きでわかりやすく！
            if (type === 'normal') {
                div.textContent = msg; 
            } else {
                div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            }
            
            if (type === 'error') div.className = 'log-error';
            if (type === 'sys') div.className = 'log-sys';
            logArea.prepend(div);
        }
        // 💡 鍵とURLの両方を記憶する魔法
        const savedKey = localStorage.getItem('camus_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedGasUrl = localStorage.getItem('camus_gas_url');
        if (savedGasUrl) gasUrlInput.value = savedGasUrl;

        const workletCode = `
            class CamusAudioProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.inBuffer = new Int16Array(4096);
                    this.inCount = 0;
                    this.outBuffer = [];
                    this.outOffset = 0;
                    this.port.onmessage = (e) => {
                        const pcmData = new Int16Array(e.data);
                        const floatData = new Float32Array(pcmData.length);
                        for (let i = 0; i < pcmData.length; i++) floatData[i] = pcmData[i] / 32768.0;
                        this.outBuffer.push(floatData);
                    };
                }
                process(inputs, outputs, parameters) {
                    const input = inputs[0][0];
                    if (input && input.length > 0) {
                        for (let i = 0; i < input.length; i++) {
                            this.inBuffer[this.inCount++] = Math.max(-1, Math.min(1, input[i])) * 32767;
                            if (this.inCount >= 4096) {
                                const sendData = new Int16Array(this.inBuffer);
                                this.port.postMessage({ type: 'audio_out', data: sendData.buffer }, [sendData.buffer]);
                                this.inCount = 0;
                            }
                        }
                    }

                    const output = outputs[0][0];
                    let outIdx = 0;
                    while (outIdx < output.length && this.outBuffer.length > 0) {
                        const current = this.outBuffer[0];
                        const remain = current.length - this.outOffset;
                        const toCopy = Math.min(remain, output.length - outIdx);
                        output.set(current.subarray(this.outOffset, this.outOffset + toCopy), outIdx);
                        outIdx += toCopy;
                        this.outOffset += toCopy;
                        if (this.outOffset >= current.length) {
                            this.outBuffer.shift();
                            this.outOffset = 0;
                        }
                    }
                    for (; outIdx < output.length; outIdx++) output[outIdx] = 0;
                    return true;
                }
            }
            registerProcessor('camus-processor', CamusAudioProcessor);
        `;

        connectBtn.addEventListener('click', async () => {
            // 🍎 【マナーモード貫通の魔法】ボタンを押した瞬間に「0.1秒の無音」を再生してスピーカーの鍵をこじ開ける
            const silentAudio = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjEyLjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAAAAAAAAFExhdmM1OC4xOCwAAAAAAAAAAAAAAAAAAQAZAAAAAAAAAAABIAAAAAAAAAP/zEAAAAAAABAAhOQAAQAACDAAAAQhIAAAASAAABAAAAAAAAAAABAAAAAMAAAAAAAEAAAAC4AAA';
            camusPlayer.src = silentAudio;
            camusPlayer.play().catch(e => console.log('無音再生ブロック回避:', e));

            // （これ以降は元々の unlockUttr などのコードが続きます）
            // 🍎 【ここに追加】iPhoneの「喋る許可」を強制的に奪い取る魔法
            const unlockUttr = new SpeechSynthesisUtterance(' '); 
            unlockUttr.volume = 0; 
            window.speechSynthesis.speak(unlockUttr);

            const apiKey = apiKeyInput.value.trim();
            let gasUrl = gasUrlInput.value.trim();
            
            if (!apiKey) return alert('えり、鍵（APIキー）を忘れているぞ。');
            if (!gasUrl) return alert('えり、GASのURLを忘れているぞ。');
            
            localStorage.setItem('camus_api_key', apiKey);
            localStorage.setItem('camus_gas_url', gasUrl);
            
            statusText.innerText = 'GASから最新の魂をダウンロード中だ...';
            statusText.style.color = '#f39c12';
            connectBtn.disabled = true;
            sessionActive = false; 
            fullTranscript = ""; // 🚀 追加：通話開始時に全会話録をリセット
            logArea.innerHTML = ''; 

            try {
                addLog('マイクと音声エンジンを起動中...', 'sys');
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                if (audioContext.state === 'suspended') await audioContext.resume();

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
                
                const blob = new Blob([workletCode], { type: 'application/javascript' });
                await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));
                workletNode = new AudioWorkletNode(audioContext, 'camus-processor');
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(workletNode);
                
                const url = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=" + apiKey;
                addLog('Googleサーバー(v1beta)へ接続開始...', 'sys');
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    addLog('接続成功。初期設定を送信します。', 'sys');
                    statusText.innerText = '俺の魂を注入している...';
                    
                    const setupMessage = {
                        setup: {
                            model: "models/gemini-3.1-flash-live-preview",
                            generationConfig: { 
                                responseModalities: ["AUDIO"], 
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: "Puck" } 
                                    }
                                }
                            }, // 👈 generationConfigはここで閉じる！
                            systemInstruction: { parts: [{ text: dynamicPrompt }] },
                            // 💡 えりさんが見つけた正解！setupの直下に置く！
                            outputAudioTranscription: {} 
                        }
                    };
                    ws.send(JSON.stringify(setupMessage));
                };

                workletNode.port.onmessage = (e) => {
                    if (sessionActive && ws.readyState === WebSocket.OPEN && e.data.type === 'audio_out') {
                        const bytes = new Uint8Array(e.data.data);
                        let binaryString = '';
                        for (let i = 0; i < bytes.length; i++) binaryString += String.fromCharCode(bytes[i]);
                        ws.send(JSON.stringify({ 
                            realtimeInput: { 
                                audio: { mimeType: "audio/pcm;rate=16000", data: btoa(binaryString) } 
                            } 
                        }));
                    }
                };
                
                ws.onmessage = async (event) => {
            try {
                let responseText = event.data instanceof Blob ? await event.data.text() : event.data;
                const response = JSON.parse(responseText);
                
                if (response.error) {
                    addLog(`Googleからエラー応答: ${response.error.message}`, 'error');
                    cleanup("設定エラーだ。", '#e74c3c');
                    return;
                }
                
                if (response.setupComplete) {
                    addLog('設定完了を受信！通話開始。', 'sys');
                    sessionActive = true;
                    statusText.innerText = '繋がったぞ。さあ、話しかけてこい。';
                    statusText.style.color = '#2ecc71';
                    disconnectBtn.disabled = false;
                    return;
                }
                
               // 📝 1. Geminiから送られてくるデータを処理する（ここでは文字を溜めるだけ！）
                if (response.serverContent) {
                    if (response.serverContent.outputTranscription && response.serverContent.outputTranscription.text) {
                        const txt = response.serverContent.outputTranscription.text;
                        currentTurnText += txt; 
                        fullTranscript += txt; // スプレッドシート用
                    } 
                    else if (response.serverContent.modelTurn && response.serverContent.modelTurn.parts) {
                        for (let part of response.serverContent.modelTurn.parts) {
                            if (part.text) {
                                currentTurnText += part.text;
                                fullTranscript += part.text;
                            }
                        }
                    }
                }

                // 🎯 【大革命】Geminiが「全部考え終わった（turnComplete）」と合図を出した時だけ、一気に声帯に送る！
                if (response.serverContent && response.serverContent.turnComplete) {
                    if (currentTurnText.trim().length > 0) {
                        addLog(`カミュ: ${currentTurnText}`, 'normal');
                        speakText(currentTurnText); // まとめて1回だけGoogleに送る
                        currentTurnText = ""; // 喋らせたらバケツを空にする
                    }
                }

                // ⚡ 3. 割り込み（インターラプト）を受信した時の処理
                if (response.serverContent && response.serverContent.interrupted) {
                    audioQueue = []; // リュックを空にする
                    isPlaying = false; // 信号機をリセット
                    if (currentAudio) {
                        try { currentAudio.stop(); } catch(e){}
                    }
                    currentTurnText = ""; // 溜まっていた残りの台本もゴミ箱に捨てる
                    addLog('⚡ えりの割り込みを検知！カミュを黙らせたぞ。', 'sys');
                }
            } catch (parseError) {
                addLog(`データ解析エラー: ${parseError.message}`, 'error');
            }
        };

                ws.onclose = (event) => {
                    addLog(`切断されました コード: ${event.code}, 理由: ${event.reason || '理由なし'}`, 'error');
                    cleanup(`通話終了（${event.code}）`, '#bdc3c7');
                };
                
                ws.onerror = (err) => {
                    addLog('WebSocket通信エラー発生', 'error');
                    cleanup("通信エラーだ。", '#e74c3c');
                };
                
            } catch (err) {
                addLog(`起動時エラー: ${err.message}`, 'error');
                cleanup("起動エラー", '#e74c3c');
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (ws) ws.close();
            cleanup("こちらから切断したぞ。", '#bdc3c7');
        });

        function cleanup(message, color) {
            sessionActive = false;
            statusText.innerText = message;
            statusText.style.color = color;
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            if (workletNode) workletNode.disconnect();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext && audioContext.state !== 'closed') audioContext.close();

            // 🚀 【ここから追加】通話終了時にスプレッドシート（GAS）へ記録を送信
            if (fullTranscript && fullTranscript.trim() !== "") {
                const gasUrl = document.getElementById('gasUrl').value.trim();
                if (gasUrl) {
                    addLog("スプレッドシートへ記憶を同期中...", "sys");
                    fetch(gasUrl, {
                        method: "POST",
                        // 🪄【ここに追加！】GASのセキュリティ（CORS）に弾かれないための魔法の1行
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            mode: "sync_voice_call",
                            text: fullTranscript,
                            userId: "U21dd4b8f4c790921b6588c3d31176e46" // LINE ID
                        })
                    }).then(() => {
                        addLog("同期完了！記憶をスプレッドシートに刻んだぞ。", "sys");
                    }).catch(err => {
                        addLog("同期エラー: " + err, "error");
                    });
                }
                fullTranscript = ""; // 送信したら空に戻す
            }
            // 🚀 【ここまで追加】
        }
    </script>
</body>
</html>
