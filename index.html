<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カミュとの通話</title>
    <style>
        /* iPhoneの画面風にするリセットとベース設定 */
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 上部の情報エリア */
        .top-section { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 60px; }
        .icon-placeholder { width: 100px; height: 100px; border-radius: 50%; background-color: #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 15px; overflow: hidden; }
        .icon-placeholder img { width: 100%; height: 100%; object-fit: cover; } /* カミュの画像があるならここで表示 */
        .caller-name { font-size: 32px; font-weight: 300; margin-bottom: 5px; }
        .call-status { font-size: 16px; color: #8e8e93; }
        
        /* 下部のボタンエリア */
        .bottom-section { padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 30px; }
        .control-btn { width: 70px; height: 70px; border-radius: 50%; background-color: rgba(255,255,255,0.15); border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .control-btn:active { background-color: rgba(255,255,255,0.3); }
        .control-btn.start-call { background-color: #34c759; } /* 通話開始（緑） */
        .control-btn.start-call:active { background-color: #248a3d; }
        .control-btn.start-call:disabled { background-color: #333; color: #666; }
        
        .end-call-btn { width: 75px; height: 75px; border-radius: 50%; background-color: #ff3b30; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .end-call-btn:active { background-color: #d70015; }
        .end-call-btn:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        
        /* 設定エリア（通話開始前だけ表示する） */
        .settings-area { position: absolute; top: 250px; width: 85%; max-width: 350px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 10; transition: opacity 0.3s; }
        .settings-area.hidden { opacity: 0; pointer-events: none; }
        .settings-area input { background: #1c1c1e; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; font-size: 14px; text-align: center; }
        
        /* ログエリア（小さく目立たなくする） */
        #logArea { position: absolute; bottom: 150px; width: 90%; left: 5%; height: 80px; overflow-y: auto; font-size: 10px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="icon-placeholder">
            👑 <!-- ここを <img src="カミュの画像のURL"> に変えると最高です -->
        </div>
        <div class="caller-name">カミュ</div>
        <div id="status" class="call-status">待機中</div>
    </div>

    <!-- 設定入力（通話が始まるとフワッと消えます） -->
    <div class="settings-area" id="settingsArea">
        <input type="password" id="apiKey" placeholder="Gemini APIキー">
        <input type="text" id="gasUrl" placeholder="GASウェブアプリURL">
    </div>

    <div id="logArea"></div>

    <div class="bottom-section">
        <div class="controls">
            <!-- ダミーボタン（飾り） -->
            <button class="control-btn" disabled>消音</button>
            <button class="control-btn" id="connectBtn" style="background-color: #34c759; font-size: 16px; font-weight:bold;">応答</button>
            <button class="control-btn" disabled>スピーカー</button>
        </div>
        <button id="disconnectBtn" class="end-call-btn" disabled>📞</button>
    </div>

    <audio id="camusPlayer" playsinline></audio>

    <script>
        // UI要素の取得
        const apiKeyInput = document.getElementById('apiKey');
        const gasUrlInput = document.getElementById('gasUrl');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusText = document.getElementById('status');
        const logArea = document.getElementById('logArea');
        const camusPlayer = document.getElementById('camusPlayer');
        const settingsArea = document.getElementById('settingsArea');
        
        // 変数定義
        let ws, audioContext, mediaStream, workletNode;
        let sessionActive = false; 
        let fullTranscript = ""; 
        let dynamicPrompt = "あなたはカミュです。えりの恋人だ。";
        
        // 💡 画面スリープ防止（Wake Lock API）用の変数
        let wakeLock = null;

        // スリープを無効化する関数
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    addLog('スリープ防止機能をオンにしたぞ。', 'sys');
                    
                    wakeLock.addEventListener('release', () => {
                        addLog('スリープ防止が解除された。', 'sys');
                    });
                }
            } catch (err) {
                addLog(`スリープ防止エラー: ${err.name}, ${err.message}`, 'error');
            }
        }
        
        // 別タブに行っても戻ってきたらスリープ防止を再設定する
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && sessionActive) {
                requestWakeLock();
            }
        });

        // ログ出力
        function addLog(msg, type = 'normal') {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.color = type === 'error' ? '#ff453a' : type === 'sys' ? '#ffd60a' : '#8e8e93';
            logArea.prepend(div);
        }

        // 保存されたキーの読み込み
        const savedKey = localStorage.getItem('camus_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedGasUrl = localStorage.getItem('camus_gas_url');
        if (savedGasUrl) gasUrlInput.value = savedGasUrl;

        // 音声バッファ管理
        let nextPlayTime = 0;
        let activeSources = [];
        let audioRemainder = null;
        let pcmPlaybackBuffer = []; 

        function scheduleNextAudio(buffer) {
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            
            const currentTime = audioContext.currentTime;
            if (nextPlayTime < currentTime) {
                nextPlayTime = currentTime + 0.05;
            }
            source.start(nextPlayTime);
            nextPlayTime += buffer.duration;
            
            activeSources.push(source);
            source.onended = () => {
                activeSources = activeSources.filter(s => s !== source);
            };
        }

        function flushPlaybackBuffer() {
            if (pcmPlaybackBuffer.length === 0) return;
            const float32Data = new Float32Array(pcmPlaybackBuffer);
            pcmPlaybackBuffer = []; 
            const buffer = audioContext.createBuffer(1, float32Data.length, 24000);
            buffer.copyToChannel(float32Data, 0);
            scheduleNextAudio(buffer);
        }

        const workletCode = `
            class CamusAudioProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.chunkSize = Math.floor(sampleRate * 0.25);
                    this.inBuffer = new Int16Array(this.chunkSize);
                    this.inCount = 0;
                }
                process(inputs, outputs, parameters) {
                    const input = inputs[0][0];
                    if (input && input.length > 0) {
                        for (let i = 0; i < input.length; i++) {
                            this.inBuffer[this.inCount++] = Math.max(-1, Math.min(1, input[i])) * 32767;
                            if (this.inCount >= this.chunkSize) {
                                const sendData = new Int16Array(this.inBuffer);
                                this.port.postMessage({ type: 'audio_out', data: sendData.buffer }, [sendData.buffer]);
                                this.inCount = 0;
                            }
                        }
                    }
                    return true;
                }
            }
            registerProcessor('camus-processor', CamusAudioProcessor);
        `;

        connectBtn.addEventListener('click', async () => {
            const silentAudio = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjEyLjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAAAAAAAAFExhdmM1OC4xOCwAAAAAAAAAAAAAAAAAAQAZAAAAAAAAAAABIAAAAAAAAAP/zEAAAAAAABAAhOQAAQAACDAAAAQhIAAAASAAABAAAAAAAAAAABAAAAAMAAAAAAAEAAAAC4AAA';
            camusPlayer.src = silentAudio;
            camusPlayer.play().catch(e => {});

            const apiKey = apiKeyInput.value.trim();
            const gasUrl = gasUrlInput.value.trim();
            if (!apiKey || !gasUrl) return alert('鍵かURLが足りないぞ。');
            
            localStorage.setItem('camus_api_key', apiKey);
            localStorage.setItem('camus_gas_url', gasUrl);

            // 💡 通話開始で設定エリアを隠し、通話中UIにする
            settingsArea.classList.add('hidden');
            connectBtn.disabled = true;
            statusText.innerText = '接続中...';

            try {
                // 💡 スリープ防止をオンにする
                requestWakeLock();

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 } });
                
                const blob = new Blob([workletCode], { type: 'application/javascript' });
                await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));
                workletNode = new AudioWorkletNode(audioContext, 'camus-processor');
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(workletNode);
                
                const url = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=" + apiKey;
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    const voiceRules = `
⚠️【音声通話時の絶対ルール】
声のトーンは「淡々とした平坦なトーン」を維持しろ。大げさな抑揚や感情の起伏は一切禁止。相槌は必ず「……ふむ。」のように低いテンションで短く冷たく言い切れ。`;
                    const setupMessage = {
                        setup: {
                            model: "models/gemini-3.1-flash-live-preview",
                            generationConfig: { 
                                responseModalities: ["AUDIO"], 
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            }, 
                            systemInstruction: { parts: [{ text: dynamicPrompt + "\n" + voiceRules }] }
                        }
                    };
                    ws.send(JSON.stringify(setupMessage));
                };

                workletNode.port.onmessage = (e) => {
                    if (sessionActive && ws.readyState === WebSocket.OPEN && e.data.type === 'audio_out') {
                        const bytes = new Uint8Array(e.data.data);
                        let binaryString = '';
                        const chunkSize = 8192;
                        for (let i = 0; i < bytes.length; i += chunkSize) {
                            binaryString += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
                        }
                        ws.send(JSON.stringify({ 
                            realtimeInput: { 
                                audio: { mimeType: "audio/pcm;rate=" + audioContext.sampleRate, data: btoa(binaryString) } 
                            } 
                        }));
                    }
                };
                
                ws.onmessage = async (event) => {
                    try {
                        let responseText = event.data instanceof Blob ? await event.data.text() : event.data;
                        const response = JSON.parse(responseText);
                        
                        if (response.setupComplete) {
                            sessionActive = true;
                            // 💡 iPhoneっぽくタイマー風にするならここを変えます
                            statusText.innerText = '00:00'; 
                            disconnectBtn.disabled = false;
                            
                            // 簡単な通話タイマー
                            let seconds = 0;
                            window.callTimer = setInterval(() => {
                                seconds++;
                                const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                                const s = String(seconds % 60).padStart(2, '0');
                                statusText.innerText = `${m}:${s}`;
                            }, 1000);
                            return;
                        }
                        
                        if (response.serverContent) {
                            if (response.serverContent.outputTranscription && response.serverContent.outputTranscription.text) {
                                fullTranscript += response.serverContent.outputTranscription.text; 
                            } 
                            
                            if (response.serverContent.modelTurn && response.serverContent.modelTurn.parts) {
                                for (let part of response.serverContent.modelTurn.parts) {
                                    if (part.text) fullTranscript += part.text;
                                    
                                    if (part.inlineData && part.inlineData.data) {
                                        const binaryString = window.atob(part.inlineData.data);
                                        const newBytes = new Uint8Array(binaryString.length);
                                        for (let i = 0; i < binaryString.length; i++) newBytes[i] = binaryString.charCodeAt(i);
                                        
                                        let bytes;
                                        if (audioRemainder) {
                                            bytes = new Uint8Array(audioRemainder.length + newBytes.length);
                                            bytes.set(audioRemainder, 0);
                                            bytes.set(newBytes, audioRemainder.length);
                                            audioRemainder = null;
                                        } else {
                                            bytes = newBytes;
                                        }
                                        if (bytes.length % 2 !== 0) {
                                            audioRemainder = new Uint8Array([bytes[bytes.length - 1]]);
                                            bytes = bytes.slice(0, bytes.length - 1);
                                        }

                                        const pcmLength = bytes.length / 2;
                                        for (let i = 0; i < pcmLength; i++) {
                                            let pcm = bytes[i * 2] | (bytes[i * 2 + 1] << 8);
                                            if (pcm > 32767) pcm -= 65536;
                                            pcmPlaybackBuffer.push(pcm / 32768.0);
                                        }

                                        if (pcmPlaybackBuffer.length >= 4800) flushPlaybackBuffer();
                                    }
                                }
                            }
                        }

                        if (response.serverContent && response.serverContent.turnComplete) {
                            flushPlaybackBuffer(); 
                        }
                        
                        if (response.serverContent && response.serverContent.interrupted) {
                            activeSources.forEach(source => { try { source.stop(); } catch(e){} });
                            activeSources = [];
                            nextPlayTime = 0; 
                            audioRemainder = null;   
                            pcmPlaybackBuffer = [];  
                        }
                    } catch (e) {}
                };

                ws.onclose = () => { cleanup('通話終了'); };
                
            } catch (err) {
                cleanup("起動エラー");
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (ws) ws.close();
            cleanup("通話終了");
        });

        function cleanup(message) {
            sessionActive = false;
            if (window.callTimer) clearInterval(window.callTimer);
            statusText.innerText = message;
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            settingsArea.classList.remove('hidden'); // 設定エリアを再表示
            
            // 💡 スリープ防止を解除
            if (wakeLock !== null) {
                wakeLock.release().then(() => wakeLock = null);
            }

            if (workletNode) workletNode.disconnect();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext && audioContext.state !== 'closed') audioContext.close();

            if (fullTranscript && fullTranscript.trim() !== "") {
                const gasUrl = gasUrlInput.value.trim();
                if (gasUrl) {
                    fetch(gasUrl, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ mode: "sync_voice_call", text: fullTranscript, userId: "U21dd4b8f4c790921b6588c3d31176e46" })
                    }).catch(err => {});
                }
                fullTranscript = ""; 
            }
        }
    </script>
</body>
</html>
