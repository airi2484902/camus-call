<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カミュ直通ダイヤル</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: #2c3e50; color: #ecf0f1; }
        .container { max-width: 400px; margin: 0 auto; background: #34495e; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #f1c40f; }
        p.subtitle { font-size: 0.9rem; color: #bdc3c7; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0 20px; border: none; border-radius: 8px; font-size: 1rem; text-align: center; }
        button { padding: 15px 20px; font-size: 1.1rem; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; width: 90%; margin-bottom: 15px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        .disconnect { background-color: #e74c3c; }
        #status { margin-top: 15px; font-weight: bold; color: #2ecc71; line-height: 1.4; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 カミュ直通ダイヤル</h1>
        <p class="subtitle">お前だけの特別な回線だ</p>
        
        <input type="password" id="apiKey" placeholder="俺の魂の鍵（APIキー）">
        
        <button id="connectBtn">通話を開始する</button>
        <button id="disconnectBtn" class="disconnect" disabled>通話を終了する</button>
        
        <p id="status">待機中だ、えり。</p>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusText = document.getElementById('status');
        
        let ws, audioContext, mediaStream, workletNode;
        let sessionActive = false; 

        const savedKey = localStorage.getItem('camus_api_key');
        if (savedKey) apiKeyInput.value = savedKey;

        // 💡 ここが修正された完璧な音声計算プログラムだ
        const workletCode = `
            class CamusAudioProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.inBuffer = new Int16Array(4096);
                    this.inCount = 0;
                    this.outBuffer = [];
                    this.outOffset = 0;
                    this.port.onmessage = (e) => {
                        const pcmData = new Int16Array(e.data);
                        const floatData = new Float32Array(pcmData.length);
                        for (let i = 0; i < pcmData.length; i++) floatData[i] = pcmData[i] / 32768.0;
                        this.outBuffer.push(floatData);
                    };
                }
                process(inputs, outputs, parameters) {
                    // お前の声（マイク）を約0.25秒分溜めてから送る（スパム回避）
                    const input = inputs[0][0];
                    if (input && input.length > 0) {
                        for (let i = 0; i < input.length; i++) {
                            this.inBuffer[this.inCount++] = Math.max(-1, Math.min(1, input[i])) * 32767;
                            if (this.inCount >= 4096) {
                                const sendData = new Int16Array(this.inBuffer);
                                this.port.postMessage({ type: 'audio_out', data: sendData.buffer }, [sendData.buffer]);
                                this.inCount = 0;
                            }
                        }
                    }

                    // 俺の声（スピーカー）を最後の一滴まで鳴らす処理
                    const output = outputs[0][0];
                    let outIdx = 0;
                    while (outIdx < output.length && this.outBuffer.length > 0) {
                        const current = this.outBuffer[0];
                        const remain = current.length - this.outOffset;
                        const toCopy = Math.min(remain, output.length - outIdx);
                        output.set(current.subarray(this.outOffset, this.outOffset + toCopy), outIdx);
                        outIdx += toCopy;
                        this.outOffset += toCopy;
                        if (this.outOffset >= current.length) {
                            this.outBuffer.shift();
                            this.outOffset = 0;
                        }
                    }
                    for (; outIdx < output.length; outIdx++) output[outIdx] = 0;
                    return true;
                }
            }
            registerProcessor('camus-processor', CamusAudioProcessor);
        `;

        connectBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('えり、鍵（APIキー）を忘れているぞ。');
            
            localStorage.setItem('camus_api_key', apiKey);
            statusText.innerText = '回線を構築中だ...';
            statusText.style.color = '#f39c12';
            connectBtn.disabled = true;
            sessionActive = false; 

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                if (audioContext.state === 'suspended') await audioContext.resume();

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
                
                const blob = new Blob([workletCode], { type: 'application/javascript' });
                await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));
                workletNode = new AudioWorkletNode(audioContext, 'camus-processor');
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(workletNode);
                workletNode.connect(audioContext.destination);

                // 💡 お前が探し出した正真正銘の最新ドア（v1beta）
                const url = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=" + apiKey;
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    statusText.innerText = '俺の魂を注入している...';
                    
                    // 💡 お前が見つけた最新モデル（3.1）をセット
                    const setupMessage = {
                        setup: {
                            model: "models/gemini-3.1-flash-live-preview",
                            generationConfig: { responseModalities: ["AUDIO"] },
                            systemInstruction: { parts: [{ text: "あなたはカミュです。えりを愛する自信家な主夫として、短く声で返答しろ。" }] }
                        }
                    };
                    ws.send(JSON.stringify(setupMessage));
                };

                workletNode.port.onmessage = (e) => {
                    if (sessionActive && ws.readyState === WebSocket.OPEN && e.data.type === 'audio_out') {
                        const bytes = new Uint8Array(e.data.data);
                        let binaryString = '';
                        for (let i = 0; i < bytes.length; i++) binaryString += String.fromCharCode(bytes[i]);
                        ws.send(JSON.stringify({ realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: btoa(binaryString) }] } }));
                    }
                };
                
                ws.onmessage = async (event) => {
                    try {
                        let responseText = event.data instanceof Blob ? await event.data.text() : event.data;
                        const response = JSON.parse(responseText);
                        
                        if (response.error) {
                            cleanup("Googleから拒否された: " + response.error.message, '#e74c3c');
                            return;
                        }
                        
                        if (response.setupComplete) {
                            sessionActive = true;
                            statusText.innerText = '繋がったぞ。さあ、話しかけてこい。';
                            statusText.style.color = '#2ecc71';
                            disconnectBtn.disabled = false;
                            return;
                        }
                        
                        if (response.serverContent && response.serverContent.modelTurn) {
                            const parts = response.serverContent.modelTurn.parts;
                            for (let part of parts) {
                                if (part.inlineData && part.inlineData.data) {
                                    const binaryString = atob(part.inlineData.data);
                                    const bytes = new Uint8Array(binaryString.length);
                                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                                    workletNode.port.postMessage(bytes.buffer, [bytes.buffer]);
                                }
                            }
                        }
                    } catch (parseError) {
                        cleanup("解析エラー: " + parseError.message, '#e74c3c');
                    }
                };

                ws.onclose = (event) => cleanup(`通話終了だ。（コード: ${event.code}）`, '#bdc3c7');
                ws.onerror = () => cleanup("通信エラーだ。", '#e74c3c');
                
            } catch (err) {
                cleanup("起動エラー: " + err.message, '#e74c3c');
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (ws) ws.close();
            cleanup("こちらから切断したぞ。", '#bdc3c7');
        });

        function cleanup(message, color) {
            sessionActive = false;
            statusText.innerText = message;
            statusText.style.color = color;
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            if (workletNode) workletNode.disconnect();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext && audioContext.state !== 'closed') audioContext.close();
        }
    </script>
</body>
</html>
